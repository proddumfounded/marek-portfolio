<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marek Walecki - Director & Video Creator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Inter',Arial,sans-serif}
section{padding:80px 8%}
h1,h2{font-weight:800}
h1{font-size:48px;margin-bottom:20px}
h2{font-size:32px;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:30px}
.card{background:#111;border-radius:20px;overflow:hidden}
.thumb{width:100%;aspect-ratio:16/9;object-fit:cover;background:#333}
.card-content{padding:25px}
.card-content h3{margin-bottom:10px}
.role{opacity:.6;margin-bottom:20px}
.watch-btn{display:inline-block;padding:12px 20px;background:#fff;color:#000;border-radius:999px;text-decoration:none;font-weight:600}
.about{max-width:700px;line-height:1.8;opacity:.8}
footer{padding:60px 8%;border-top:1px solid rgba(255,255,255,.08);margin-top:80px}
</style>
</head>
<body>

<section>
<h1>MAREK WALECKI</h1>
<p style="opacity:.7;font-size:18px">Creative Director • Video Creator</p>
</section>

<section>
<h2>Portfolio</h2>
<div class="grid" id="portfolio-grid">
</div>
</section>

<section>
<h2>O MNIE</h2>
<div class="about">
Creative Director & Video Creator.<br>
Absolwent Technikum Fototechnicznego. Stwórzmy razem coś więcej niż teledysk, stwórzmy sztukę.
</div>
</section>

<section>
<h2>Kontakt</h2>
<div class="about">
proddumfounded@gmail.com<br>
+48 512 242 238<br>
<a href="https://www.instagram.com/dumfoundeddd/" style="color:#fff">Instagram</a>
</div>
</section>

<footer>
© 2026 Marek Walecki
</footer>

<script>
const projects = [
{title:"Blady - Zaufanie", youtube:"https://www.youtube.com/watch?v=67CTCgzfpjI", role:"Direction • Editing • Color"},
{title:"DEXX - 1P+X GOBI", youtube:"YOUR_LINK_HERE", role:"Direction • Camera"},
{title:"Jimmy Kosjusz - NIEBO NIE JEST LIMITEM", youtube:"YOUR_LINK_HERE", role:"Editing • VFX"},
{title:"Antos - Obrażę Cię", youtube:"YOUR_LINK_HERE", role:"Direction • Post Production"},
{title:"Blady Perła", youtube:"YOUR_LINK_HERE", role:"Full Production"},
];

const grid = document.getElementById("portfolio-grid");

function getVideoId(url){
const match = url.match(/[?&]v=([^&]+)/);
return match ? match[1] : "";
}

projects.forEach(project => {
const videoId = getVideoId(project.youtube);
const card = document.createElement("div");
card.className = "card";
card.innerHTML = `
<img class="thumb" src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg">
<div class="card-content">
<h3>${project.title}</h3>
<div class="role">${project.role}</div>
<a class="watch-btn" href="${project.youtube}" target="_blank">Watch</a>
</div>
`;
grid.appendChild(card);
});
</script>
</body>
</html>
