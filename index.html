<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marek Walecki</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:'Inter',sans-serif;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:
linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.95)),
url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=2070&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:80px;
font-weight:800;
}

.hero p{
margin-top:20px;
opacity:.7;
letter-spacing:2px;
text-transform:uppercase;
}

.section{
padding:80px 8%;
}

.section-title{
font-size:32px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
}

.thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

.card-content{
padding:25px;
}

.card-content h3{
margin-bottom:10px;
}

.role{
opacity:.6;
margin-bottom:20px;
line-height:1.5;
}

.watch-btn{
display:inline-block;
padding:12px 20px;
background:white;
color:black;
border-radius:999px;
text-decoration:none;
font-weight:600;
}

.about{
max-width:700px;
line-height:1.8;
opacity:.8;
}

.about a{
color:white;
text-decoration:underline;
}

footer{
padding:60px 8%;
border-top:1px solid rgba(255,255,255,.08);
margin-top:80px;
}

</style>
</head>
<body>

<section class="hero">
<div>
<h1>MAREK WALECKI</h1>
<p>Director • Editing • Color • VFX • Camera</p>
</div>
</section>

<section class="section">

<h2 class="section-title">Portfolio</h2>

<div class="grid" id="portfolio-grid"></div>

</section>

<section class="section">

<h2 class="section-title">O MNIE</h2>

<div class="about">
Creative Director & Video Creator.<br>
Absolwent Technikum Fototechnicznego. Stwórzmy razem coś więcej niż teledysk, stwórzmy sztukę.
</div>

</section>

<section class="section">

<h2 class="section-title">Contact</h2>

<div class="about">
proddumfounded@gmail.com<br>
+48 512 242 238<br>
<a href="https://www.instagram.com/dumfoundeddd/" target="_blank">Instagram</a>
</div>

</section>

<footer>
© 2026 Marek Walecki
</footer>

<script>

const projects = [

{
title: "Teledysk 1",
role: "Direction / Editing / Color",
youtube: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
},

{
title: "Teledysk 2",
role: "Editing / Camera",
youtube: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
}

];

const grid = document.getElementById("portfolio-grid");

function getYoutubeThumbnail(url){
const videoId = url.split("v=")[1];
return `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
}

projects.forEach(project => {

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `
<img class="thumb" src="${getYoutubeThumbnail(project.youtube)}">

<div class="card-content">
<h3>${project.title}</h3>

<div class="role">
${project.role}
</div>

<a class="watch-btn" href="${project.youtube}" target="_blank">
Watch Video
</a>

</div>
`;

grid.appendChild(card);

});

</script>

</body>
</html>
