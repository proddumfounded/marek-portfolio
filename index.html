<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marek Walecki - YouTube Style 2012</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#ccc;font-family:'Segoe UI',Arial,sans-serif;font-size:13px}
a{color:#3399ff;text-decoration:none}
a:hover{text-decoration:underline}
.header{background:#000;height:50px;border-bottom:1px solid #333;padding:0 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:bold;color:#fff}
.logo span{color:#ff0000}
.search-box{flex:1;max-width:500px;margin:0 20px}
.search-box input{width:100%;padding:6px 10px;background:#222;border:1px solid #444;color:#fff;border-radius:2px}
.nav-links a{color:#ccc;margin-left:15px;font-size:12px}
.container{display:flex;padding:20px}
.sidebar{width:150px;padding-right:20px;font-size:13px}
.sidebar a{display:block;padding:8px 0;color:#ccc}
.sidebar a:hover{background:#222}
.sidebar-title{font-weight:bold;margin:15px 0 10px;color:#999;font-size:12px;text-transform:uppercase}
.main{flex:1}
.section-title{font-size:16px;font-weight:normal;color:#fff;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #333}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.video-card{background:#111;border:1px solid #222}
.video-thumb{width:100%;aspect-ratio:16/9;background:#333;position:relative;overflow:hidden}
.video-thumb img{width:100%;height:100%;object-fit:cover}
.video-duration{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.8);color:#fff;padding:2px 4px;font-size:11px}
.video-info{padding:10px}
.video-title{font-size:13px;color:#fff;margin-bottom:5px;line-height:1.3}
.video-meta{font-size:11px;color:#999}
.footer{background:#000;border-top:1px solid #333;padding:20px;color:#666;font-size:11px;margin-top:30px}
</style>
</head>
<body>
<div class="header">
<div class="logo"><span>YouTube</span> <span style="color:#ccc;font-size:14px">2012 Style</span></div>
<div class="search-box">
<input type="text" placeholder="Szukaj filmów..." readonly>
</div>
<div class="nav-links">
<a href="#">Upload</a>
<a href="#">User</a>
</div>
</div>

<div class="container">
<div class="sidebar">
<div class="sidebar-title">Nawigacja</div>
<a href="#">Strona główna</a>
<a href="#">Subskrypcje</a>
<a href="#">Historia</a>
<div class="sidebar-title">Kanał</div>
<a href="#">Marek Walecki</a>
</div>

<div class="main">
<h2 class="section-title">Music Videos</h2>
<div class="video-grid" id="video-grid">
</div>
</div>
</div>

<div class="footer">
© 2026 Marek Walecki - YouTube Style Portfolio
</div>

<script>
const videos = [
{videoId:"dQw4w9WgXcQ",title:"Teledysk 1",role:"Direction / Editing / Color"},
{videoId:"dQw4w9WgXcQ",title:"Teledysk 2",role:"Editing / Camera"}
];

const grid = document.getElementById("video-grid");

videos.forEach(video => {
const card = document.createElement("div");
card.className = "video-card";
card.innerHTML = `
<div class="video-thumb">
<img src="https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg">
<div class="video-duration">3:45</div>
</div>
<div class="video-info">
<div class="video-title">${video.title}</div>
<div class="video-meta">${video.role}<br>Marek Walecki</div>
</div>
`;
card.addEventListener("click",()=>{window.open(`https://www.youtube.com/watch?v=${video.videoId}`,"_blank");});
grid.appendChild(card);
});
</script>
</body>
</html>
